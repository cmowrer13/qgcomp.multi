url: https://cmowrer13.github.io/qgcomp.multi/

template:
  bootstrap: 5
  theme: arrow-light
  math-rendering: katex
  bslib:
    bg: "#f7faf9"
    fg: "#18343a"
    primary: "#0f6d73"
    secondary: "#5d6f73"
    border-color: "#d8e2e4"
    code-bg: "#eef4f5"
    code-color: "#174850"
    base_font: {google: "Source Sans 3"}
    heading_font: {google: "IBM Plex Sans"}
    code_font: {google: "JetBrains Mono"}
  opengraph:
    image:
      src: man/figures/social-card.png
      alt: "Hexagon logo for qgcomp.multi with two-mixture interaction motif in deep teal."

navbar:
  bg: light
  type: light
  structure:
    left: [home, reference, articles, news]
    right: [search, github]
  components:
    home:
      text: Home
      href: index.html
    news:
      text: News
      href: news/index.html

home:
  title: Two-Mixture Quantile G-Computation for R
  description: >
    Estimate the joint effects of two exposure mixtures and their interaction
    using quantile g-computation and marginal structural models.
  links:
    - text: Workflow article
      href: articles/qgcompmulti-workflow.html
    - text: Function reference
      href: reference/index.html
  sidebar:
    structure: [links, citation, authors, toc]

footer:
  structure:
    left: [developed_by, source]
    right: built_with
  components:
    source: Source on [GitHub](https://github.com/cmowrer13/qgcomp.multi).

articles:
  - title: Applied workflows
    desc: >
      Start with the main workflow article, then use the shorter companion
      articles for multiple imputation, clustered or repeated-measures data,
      optional bootstrap-level parallelism, diagnostics, adequacy, and
      sensitivity checks.
    navbar: ~
    contents:
      - qgcompmulti-workflow
      - qgcompmulti-mi-parallel
      - qgcompmulti-clustered-data
      - qgcompmulti-diagnostics-sensitivity

reference:
  - title: Model fitting
    contents:
      - qgcomp.glm.multi
      - qgcomp.glm.multi.mi
      - qgcompmulti_msm_fit

  - title: Prediction and intervention surfaces
    contents:
      - predict.qgcompmulti
      - fitted_surface
      - intervention_grid
      - plot.qgcompmulti

  - title: Diagnostics
    contents:
      - support
      - diagnostics
      - adequacy

  - title: Sensitivity analysis
    contents:
      - mcsize_sensitivity
      - b_sensitivity
      - q_sensitivity

  - title: Reporting and extractors
    contents:
      - summary.qgcompmulti
      - summary.qgcompmulti_mi
      - print.qgcompmulti
      - print.qgcompmulti_mi
      - confint.qgcompmulti
      - tidy.qgcompmulti
      - tidy.qgcompmulti_mi
      - glance.qgcompmulti
      - glance.qgcompmulti_mi
      - qgcompmulti-extractors
      - qgcompmulti-mi-extractors

  - title: Data preparation and simulation
    contents:
      - quantize_mixtures
      - sim_mixture_data
      - sim_biomarker_data
